services:
  bapp:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile
    image: bapp-dev:latest
    container_name: bapp-dev
    volumes:
      - .:/home/vscode/workspace:cached
      - venv:/home/vscode/workspace/.venv
    entrypoint: []
    command: sleep infinity

volumes:
  venv: